{{ define "main" }}
  <section class="mx-auto max-w-7xl px-6 py-16 md:px-10 md:py-20">
    <div class="max-w-3xl">
      <h1 class="text-4xl font-semibold tracking-tight text-black md:text-5xl">{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="mt-6 text-lg text-black/70">{{ . }}</p>
      {{ end }}
    </div>

    {{ if gt (len (strings.TrimSpace .RawContent)) 0 }}
      <div class="surface-card mt-10 p-8 md:p-10">
        <div class="rich-text">
          {{ .Content }}
        </div>
      </div>
    {{ end }}

    <div class="mt-10 grid gap-6 lg:grid-cols-3">
      {{ range .RegularPages.ByWeight }}
        {{ partial "project-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
