{{ define "main" }}
  <section class="mx-auto max-w-7xl px-6 py-16 md:px-10 md:py-20">
    <div class="max-w-3xl">
      <p class="eyebrow">Referenzen</p>
      <h1 class="mt-4 text-4xl font-semibold tracking-tight text-white md:text-5xl">{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="mt-6 text-lg text-stone-300">{{ . }}</p>
      {{ end }}
    </div>

    <div class="surface-card mt-10 p-8 md:p-10">
      <div class="rich-text">
        {{ .Content }}
      </div>
    </div>

    <div class="mt-10 grid gap-6 lg:grid-cols-3">
      {{ range .RegularPages.ByWeight }}
        {{ partial "project-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
