<a class="surface-card group flex h-full flex-col overflow-hidden p-6 transition duration-300 hover:-translate-y-1 hover:border-[#43A62A]" href="{{ .RelPermalink }}">
  {{ with .Params.image }}
    <div class="-mx-6 -mt-6 mb-6 aspect-[4/3] overflow-hidden border-b border-black/10 bg-[linear-gradient(135deg,rgba(67,166,42,0.04),rgba(42,67,166,0.06))]">
      <img
        class="h-full w-full object-cover"
        src="{{ . | relURL }}"
        alt="{{ $.Params.imageAlt | default $.Title }}"
        loading="lazy"
        decoding="async"
      >
    </div>
  {{ end }}

  <div class="flex items-center justify-between gap-4 text-xs font-semibold uppercase tracking-[0.28em] text-[#2A43A6]">
    <span>{{ .Params.sector | default "Projekt" }}</span>
    {{ with .Params.year }}<span>{{ . }}</span>{{ end }}
  </div>

  <h3 class="mt-5 text-2xl font-semibold text-black">
    <span class="transition group-hover:text-[#2A43A6]">{{ .Title }}</span>
  </h3>

  {{ with .Params.summary }}
    <p class="mt-4 flex-1 text-sm leading-7 text-black/70">{{ . }}</p>
  {{ end }}

  <div class="mt-6 flex items-center justify-between border-t border-black/10 pt-5 text-sm text-black/60">
    <span>{{ .Params.location }}</span>
    <span class="font-semibold text-[#A62A43] transition group-hover:text-[#8f2339]">Details</span>
  </div>
</a>
