<a class="surface-card listing-card-blue group flex h-full flex-col overflow-hidden p-0 transition duration-300 hover:-translate-y-1" href="{{ .RelPermalink }}">
  {{ with .Params.image }}
    <div class="listing-card-media mb-6 aspect-[4/3] bg-[linear-gradient(135deg,rgba(67,166,42,0.04),rgba(26,46,71,0.06))]">
      <img
        class="h-full w-full object-cover"
        src="{{ . | relURL }}"
        alt="{{ $.Params.imageAlt | default $.Title }}"
        loading="lazy"
        decoding="async"
      >
    </div>
  {{ end }}

  <div class="flex flex-1 flex-col px-6 pb-6">
    <div class="listing-card-kicker flex items-center justify-between gap-4 text-xs font-semibold uppercase tracking-[0.28em]">
      <span>{{ .Params.sector | default "Projekt" }}</span>
      {{ with .Params.year }}<span>{{ . }}</span>{{ end }}
    </div>

    <h3 class="listing-card-title mt-5 text-2xl font-semibold">
      <span class="transition">{{ .Title }}</span>
    </h3>

    {{ with .Params.summary }}
      <p class="listing-card-body mt-4 flex-1 text-sm leading-7">{{ . }}</p>
    {{ end }}

    <div class="listing-card-meta mt-6 text-sm">
      <span>{{ .Params.location }}</span>
    </div>
  </div>
</a>
