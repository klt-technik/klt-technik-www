<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default "de-AT" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{{ "css/global.css" | relURL }}">
  </head>
  <body class="bg-stone-950 text-stone-100 antialiased">
    <div class="site-shell flex min-h-screen flex-col">
      {{ partial "site-header.html" . }}
      <main class="flex-1">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "site-footer.html" . }}
    </div>
  </body>
</html>
