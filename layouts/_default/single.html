{{ define "main" }}
  <section class="mx-auto max-w-4xl px-6 py-16 md:px-10 md:py-20">
    <div class="max-w-3xl">
      <h1 class="text-4xl font-semibold tracking-tight text-black md:text-5xl">{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="mt-6 text-lg text-black/70">{{ . }}</p>
      {{ end }}
    </div>
    <div class="surface-card mt-12 p-0">
      <div class="rich-text{{ if eq .RelPermalink "/impressum/" }} impressum-rich-text{{ end }}">
        {{ .Content }}
      </div>
    </div>
  </section>
{{ end }}
